site_name: TensorStudio
site_description: Compact C++ tensor and autograd engine with a Python API.
repo_url: https://github.com/imattas/TensorStudio
repo_name: imattas/TensorStudio
theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Tensors: tensors.md
  - Autograd: autograd.md
  - Neural Networks: nn.md
  - Optimizers: optim.md
  - Data: data.md
  - Serialization: serialization.md
  - Platform Guides:
      - Windows: windows.md
      - Linux: linux.md
      - macOS: macos.md
  - API: api.md
  - Development: development.md
  - Publishing: publishing.md
