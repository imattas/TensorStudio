site_name: TensorStudio
site_description: Compact C++ tensor and autograd engine with a Python API.
repo_url: https://github.com/imattas/TensorStudio
repo_name: imattas/TensorStudio
theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Tensors: Usage/tensors.md
  - Usage:
      - Tensor API: Usage/tensors.md
      - NumPy Interop: Usage/numpy-interop.md
      - Serialization: Usage/serialization.md
      - ONNX Interchange: Usage/interchange.md
  - Autograd: Autograde/autograd.md
  - Autograd Coverage: Autograde/index.md
  - Neural Networks: Neural Networks/nn.md
  - Neural Network Guides:
      - Modules: Neural Networks/modules.md
      - Training: Neural Networks/training.md
  - Vision: Vision/index.md
  - Optimizers: Usage/optim.md
  - Data: Usage/data.md
  - Serialization: serialization.md
  - Benchmarks: Benchmarks/index.md
  - Hardware:
      - CPU Backend: Hardware/cpu-backend.md
  - Platform Guides:
      - Windows: Hardware/windows.md
      - Linux: Hardware/linux.md
      - macOS: Hardware/macos.md
  - Roadmap: Roadmap/index.md
  - API: Usage/api.md
  - Development: development.md
  - Publishing: publishing.md
