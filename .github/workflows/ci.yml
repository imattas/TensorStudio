name: CI

on:
  push:
  pull_request:

jobs:
  windows:
    name: Windows py${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install editable package
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
      - name: Import native extension
        run: python -c "import tensorstudio as ts; import tensorstudio._C; print(ts.__version__); print(ts.ones((2, 2)) + 1)"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy --python-version ${{ matrix.python-version }} python/tensorstudio
      - name: Tests
        run: pytest -q
      - name: Runner scripts
        run: |
          python test_all.py --help
          python benchmark_all.py --help
      - name: Example
        run: python examples/basic_tensor_ops.py

  linux:
    name: Linux py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: windows
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install editable package
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
      - name: Import native extension
        run: python -c "import tensorstudio as ts; import tensorstudio._C; print(ts.__version__)"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy --python-version ${{ matrix.python-version }} python/tensorstudio
      - name: Tests
        run: pytest -q
      - name: Runner scripts
        run: |
          python test_all.py --help
          python benchmark_all.py --help
      - name: Example
        run: python examples/basic_tensor_ops.py

  macos:
    name: macOS py${{ matrix.python-version }}
    runs-on: macos-latest
    needs: linux
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install editable package
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
      - name: Import native extension
        run: python -c "import tensorstudio as ts; import tensorstudio._C; print(ts.__version__)"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy --python-version ${{ matrix.python-version }} python/tensorstudio
      - name: Tests
        run: pytest -q
      - name: Runner scripts
        run: |
          python test_all.py --help
          python benchmark_all.py --help
      - name: Example
        run: python examples/basic_tensor_ops.py
