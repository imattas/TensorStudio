name: Publish

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

env:
  CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
  CIBW_SKIP: "*-musllinux*"
  CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
  CIBW_TEST_COMMAND: >-
    python -c "import tensorstudio as ts; import tensorstudio._C; x = ts.ones((2, 2), requires_grad=True); y = ((x * 2.0) + 1.0).sum(); y.backward(); assert x.grad.tolist() == [[2.0, 2.0], [2.0, 2.0]]; print(ts.__version__, x.grad.tolist())"

jobs:
  windows_wheels:
    name: Windows wheels
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build Windows wheels
        uses: pypa/cibuildwheel@v2.23.3
        env:
          CIBW_ARCHS_WINDOWS: "AMD64"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: wheelhouse/*.whl

  linux_wheels:
    name: Linux wheels
    runs-on: ubuntu-latest
    needs: windows_wheels
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build Linux wheels
        uses: pypa/cibuildwheel@v2.23.3
        env:
          CIBW_ARCHS_LINUX: "x86_64"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: wheelhouse/*.whl

  macos_wheels:
    name: macOS wheels
    runs-on: macos-latest
    needs: linux_wheels
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build macOS wheels
        uses: pypa/cibuildwheel@v2.23.3
        env:
          CIBW_ARCHS_MACOS: "auto"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    needs: macos_wheels
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist
        run: |
          python -m pip install -U build twine
          python -m build --sdist
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [windows_wheels, linux_wheels, macos_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: pypi
    env:
      HAS_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN != '' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - name: Verify artifacts
        run: |
          python -m pip install -U twine
          python -m twine check dist/*
      - name: Publish to PyPI with configured API token
        if: env.HAS_PYPI_TOKEN == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true
      - name: Publish to PyPI with Trusted Publishing
        if: env.HAS_PYPI_TOKEN != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
